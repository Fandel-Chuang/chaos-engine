# ChaosEngine CI - GitHub Actions
# 每次 push / PR 自动运行：编译 + 全量测试 + 冒烟测试 + Lua 语法检查 + Valgrind

name: ChaosEngine CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  # ── Job 1: 编译 + 全量测试 + 冒烟验证 ──
  build-and-test:
    name: 编译 & 测试 (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential \
            liblua5.4-dev liburing-dev libbpf-dev \
            clang llvm luarocks xvfb xauth \
            libvulkan-dev libx11-dev \
            flatbuffers-compiler

      - name: 安装 Lapis
        run: |
          sudo luarocks install lapis
          sudo luarocks install lua-cjson

      - name: CMake 配置
        run: |
          mkdir -p build && cd build
          {
            echo "### third_party 诊断"
            echo '```'
            ls -la ../third_party/lua/lib/ 2>/dev/null || echo "third_party/lua/lib 不存在"
            ls -la ../third_party/vulkan/lib/ 2>/dev/null || echo "third_party/vulkan/lib 不存在"
            file ../third_party/lua/lib/liblua5.4.so 2>/dev/null || echo "liblua5.4.so 不存在"
            readlink -f ../third_party/lua/lib/liblua5.4.so 2>/dev/null || echo "readlink 失败"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          cmake .. -DCMAKE_BUILD_TYPE=Debug 2>&1 | tee /tmp/cmake_output.txt
          {
            echo "### CMake 输出"
            echo '```'
            cat /tmp/cmake_output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: 编译
        run: |
          set -o pipefail
          cd build && make VERBOSE=1 -k -j$(nproc) 2>&1 | tee /tmp/make_output.txt || true
          {
            echo "### 编译输出（最后80行）"
            echo '```'
            tail -80 /tmp/make_output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          # 检查核心目标是否编译成功
          test -f bin/chaos_server || { echo "::error::chaos_server 编译失败"; exit 1; }

      - name: 全量测试
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: 冒烟测试
        shell: bash
        run: |
          echo "=== 验证编译产物 ==="
          ls build/bin/ 2>/dev/null || echo "build/bin 目录不存在"
          if [ -f build/bin/chaos_server ]; then
            echo "chaos_server OK"
          else
            echo "::error::chaos_server not found"
            exit 1
          fi

  # ── Job 2: Release 编译验证 ──
  release-build:
    name: Release 编译
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential \
            liblua5.4-dev liburing-dev libbpf-dev \
            clang llvm \
            libvulkan-dev libx11-dev \
            flatbuffers-compiler

      - name: Release 编译
        run: |
          mkdir -p build_rel && cd build_rel
          cmake .. -DCMAKE_BUILD_TYPE=Release 2>&1 | tee /tmp/cmake_rel.txt
          make VERBOSE=1 -j$(nproc) 2>&1 | tee /tmp/make_rel.txt || {
            {
              echo "### Release 编译错误"
              echo '```'
              grep -iE 'error:|undefined reference|FAILED' /tmp/make_rel.txt | tail -20
              echo '```'
              echo "### CMake 输出"
              echo '```'
              cat /tmp/cmake_rel.txt
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
            exit 1
          }

  # ── Job 3: Lua 语法检查 ──
  lua-lint:
    name: Lua 语法检查
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Lua
        run: sudo apt-get install -y -qq lua5.4

      - name: 语法检查
        run: |
          echo "检查所有 Lua 文件语法..."
          FAIL=0
          for f in $(find src_lua/ -name '*.lua'); do
            if ! lua5.4 -e "loadfile('$f')" 2>/dev/null; then
              echo "❌ 语法错误: $f"
              lua5.4 -e "loadfile('$f')"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 0 ]; then
            echo "✅ 所有 Lua 文件语法正确 ($(find src_lua/ -name '*.lua' | wc -l) 个文件)"
          else
            exit 1
          fi

  # ── Job 4: 内存检查 (Valgrind) ──
  memcheck:
    name: 内存检查 (Valgrind)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake build-essential valgrind \
            liblua5.4-dev liburing-dev libbpf-dev \
            clang llvm \
            libvulkan-dev libx11-dev \
            flatbuffers-compiler

      - name: 编译 (Debug)
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug
          make -j$(nproc)

      - name: Valgrind 内存检查
        run: |
          cd build
          for test in test_math test_memory test_ecs test_aoi test_cell test_network test_net_base; do
            echo "--- Valgrind: $test ---"
            valgrind --leak-check=full --error-exitcode=1 \
              --suppressions=../scripts/valgrind.supp \
              ./bin/$test 2>&1 | tail -5 || {
              echo "❌ $test 内存泄漏"
              exit 1
            }
          done
          echo "✅ Valgrind 检查通过"
